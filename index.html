<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

      <title>PH Sistema</title>

        <link rel="stylesheet" href="style.css">

          <link rel="preconnect" href="https://fonts.googleapis.com">
            <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
            </head>

            <body>

            <header>

              <h1>PH SISTEMA</h1>

                <div class="pedido-total">
                    Pedido: R$ <span id="pedidoTotal">0.00</span>
                      </div>

                      </header>

                      <div class="container">

                        <!-- ESTOQUE -->
                          <section class="estoque">

                              <div class="section-top">

                                    <h2>📦 Estoque</h2>

                                          <button class="btn green" onclick="openModal()">
                                                  + Produto
                                                        </button>

                                                            </div>

                                                                <input type="text" id="searchInput" placeholder="Pesquisar produto...">

                                                                    <div class="products-grid" id="productsGrid"></div>

                                                                      </section>

                                                                        <!-- PEDIDO -->
                                                                          <section class="pedido">

                                                                              <div class="section-top">
                                                                                    <h2>🛒 Pedido do Cliente</h2>
                                                                                        </div>

                                                                                            <div id="pedidoItems"></div>

                                                                                                <div class="pedido-footer">

                                                                                                      <h3>
                                                                                                              Total: R$ <span id="pedidoTotalBottom">0.00</span>
                                                                                                                    </h3>

                                                                                                                          <div class="pedido-buttons">

                                                                                                                                  <button class="btn red" onclick="limparPedido()">
                                                                                                                                            Limpar
                                                                                                                                                    </button>

                                                                                                                                                            <button class="btn green">
                                                                                                                                                                      Finalizar
                                                                                                                                                                              </button>

                                                                                                                                                                                    </div>

                                                                                                                                                                                        </div>

                                                                                                                                                                                          </section>

                                                                                                                                                                                          </div>

                                                                                                                                                                                          <!-- MODAL -->

                                                                                                                                                                                          <div class="modal" id="modal">

                                                                                                                                                                                            <div class="modal-content">

                                                                                                                                                                                                <h2 id="modalTitle">Adicionar Produto</h2>

                                                                                                                                                                                                    <input type="text" id="productName" placeholder="Nome">

                                                                                                                                                                                                        <input type="number" id="productPrice" placeholder="Preço">

                                                                                                                                                                                                            <input type="text" id="productCategory" placeholder="Categoria">

                                                                                                                                                                                                                <input type="file" id="productImage" accept="image/*">

                                                                                                                                                                                                                    <button class="btn green" onclick="saveProduct()">
                                                                                                                                                                                                                          Salvar Produto
                                                                                                                                                                                                                              </button>

                                                                                                                                                                                                                                </div>

                                                                                                                                                                                                                                </div>

                                                                                                                                                                                                                                <script src="script.js"></script>

                                                                                                                                                                                                                                </body>
                                                                                                                                                                                                                                </html>
